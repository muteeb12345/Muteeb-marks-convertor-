<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Marks Converter</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
            padding: 50px;
        }
        .box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 300px;
            margin: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }
        input, button {
            padding: 10px;
            margin: 10px;
            width: 80%;
        }
        button {
            background: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
        h2 {
            color: #333;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Marks Converter</h2>
    <input type="number" id="marks" placeholder="Enter % (e.g. 75)">
    <button onclick="convert()">Convert</button>

    <h3 id="usResult"></h3>
    <h3 id="ukResult"></h3>
</div>

<script>
function convert() {
    let marks = document.getElementById("marks").value;

    if (marks === "" || marks < 0 || marks > 100) {
        alert("Enter valid percentage (0–100)");
        return;
    }

    // US GPA Conversion (approximate)
    let gpa;
    if (marks >= 85) gpa = 4.0;
    else if (marks >= 80) gpa = 3.7;
    else if (marks >= 75) gpa = 3.3;
    else if (marks >= 70) gpa = 3.0;
    else if (marks >= 65) gpa = 2.7;
    else if (marks >= 60) gpa = 2.3;
    else if (marks >= 55) gpa = 2.0;
    else if (marks >= 50) gpa = 1.7;
    else gpa = 0.0;

    // UK Classification
    let uk;
    if (marks >= 70) uk = "First Class";
    else if (marks >= 60) uk = "Upper Second (2:1)";
    else if (marks >= 50) uk = "Lower Second (2:2)";
    else if (marks >= 40) uk = "Third Class";
    else uk = "Fail";

    document.getElementById("usResult").innerText = "US GPA: " + gpa;
    document.getElementById("ukResult").innerText = "UK Grade: " + uk;
}
</script>

</body>
</html>
